apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-control-plane
  namespace: pulsar-system
  labels:
    app.kubernetes.io/name: pulsar
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsar
        app.kubernetes.io/component: control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      serviceAccountName: pulsar-controller
      containers:
        - name: pulsar
          image: pulsar-control-plane:2.0.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PULSAR_CONFIG
              value: /etc/pulsar/pulsar.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/pulsar
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: pulsar-config
        - name: data
          persistentVolumeClaim:
            claimName: pulsar-data

---
apiVersion: v1
kind: Service
metadata:
  name: pulsar-control-plane
  namespace: pulsar-system
  labels:
    app.kubernetes.io/name: pulsar
spec:
  selector:
    app.kubernetes.io/name: pulsar
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulsar-controller
  namespace: pulsar-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pulsar-controller
rules:
  # Create/manage GPU workload pods and jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read node GPU capacity
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # CRD management
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "get", "list"]
  - apiGroups: ["pulsar.io"]
    resources: ["gpuworkloads"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pulsar.io"]
    resources: ["gpuworkloads/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["pulsar.io"]
    resources: ["pulsarqueues"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pulsar.io"]
    resources: ["pulsarqueues/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["pulsar.io"]
    resources: ["fairnesspolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pulsar.io"]
    resources: ["fairnesspolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["pulsar.io"]
    resources: ["tenantquotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pulsar.io"]
    resources: ["tenantquotas/status"]
    verbs: ["get", "update", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pulsar-controller
subjects:
  - kind: ServiceAccount
    name: pulsar-controller
    namespace: pulsar-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulsar-controller

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pulsar-data
  namespace: pulsar-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Namespace
metadata:
  name: pulsar-system
  labels:
    app.kubernetes.io/name: pulsar
