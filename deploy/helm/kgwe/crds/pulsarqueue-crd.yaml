apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pulsarqueues.kgwe.nvidia.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  labels:
    app.kubernetes.io/name: kgwe
    app.kubernetes.io/part-of: kgwe
spec:
  group: kgwe.nvidia.io
  names:
    kind: PulsarQueue
    listKind: PulsarQueueList
    plural: pulsarqueues
    singular: pulsarqueue
    shortNames:
      - pq
      - pqueue
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Depth
          type: integer
          jsonPath: .status.depth
        - name: Policy
          type: string
          jsonPath: .spec.policy
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: PulsarQueue defines a GPU workload queue with scheduling policy and capacity limits
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                policy:
                  type: string
                  enum:
                    - fifo
                    - fair_share
                    - priority
                    - backfill
                    - drf
                  default: fair_share
                  description: Queue scheduling policy
                maxDepth:
                  type: integer
                  minimum: 1
                  maximum: 10000
                  default: 1000
                  description: Maximum number of jobs in queue
                maxDepthPerTenant:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 50
                  description: Maximum queue depth per tenant/user
                agingEnabled:
                  type: boolean
                  default: true
                  description: Enable priority aging for queued jobs
                agingBoostIntervalSeconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                  default: 60
                  description: Seconds between priority boosts for waiting jobs
                agingBoostAmount:
                  type: integer
                  minimum: 0
                  maximum: 10
                  default: 1
                  description: Priority levels to boost per aging interval
                starvationThresholdSeconds:
                  type: integer
                  minimum: 1
                  maximum: 86400
                  default: 300
                  description: Force-promote jobs waiting longer than this
                preemptionSignals:
                  type: boolean
                  default: true
                  description: Emit Kubernetes preemption signals for queued jobs
                allowedGpuClasses:
                  type: array
                  items:
                    type: string
                    enum:
                      - dgpu
                      - igpu
                      - any
                  default:
                    - dgpu
                    - igpu
                  description: Allowed GPU classes for this queue
                fallbackPolicy:
                  type: object
                  properties:
                    preferredGpuClass:
                      type: string
                      enum:
                        - dgpu
                        - igpu
                      default: dgpu
                    fallbackGpuClass:
                      type: string
                      enum:
                        - dgpu
                        - igpu
                      default: igpu
                    maxWaitSeconds:
                      type: integer
                      minimum: 0
                      maximum: 86400
                      default: 0
                      description: Seconds to wait before falling back to alternate GPU class
            status:
              type: object
              properties:
                depth:
                  type: integer
                  description: Current queue depth
                depthPerTenant:
                  type: object
                  additionalProperties:
                    type: integer
                  description: Current queue depth per tenant
                active:
                  type: boolean
                  description: Whether the queue is actively scheduling
                oldestJobAgeSeconds:
                  type: integer
                  description: Age of oldest queued job in seconds
                scheduledJobCount:
                  type: integer
                  description: Total jobs scheduled through this queue
                preemptedJobCount:
                  type: integer
                  description: Total jobs preempted from this queue
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
